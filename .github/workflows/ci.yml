# Full CI gate (REQ-GOV-032, REQ-CON-021). Every merge is gated on all of these.
name: ci

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always
  CARGO_HTTP_CHECK_REVOKE: "false"

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned toolchain
        run: rustup show
      - name: Install gate tooling
        run: |
          cargo install cargo-deny --locked || true
          cargo install cargo-audit --locked || true
          rustup component add llvm-tools-preview
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy (deny warnings, max strictness)
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Build (release, all targets)
        run: cargo build --release --all-targets
      - name: Test (unit + integration + doctests)
        run: cargo test --all
      - name: Project gates (banned tokens, fn-size, RTM, SBOM)
        run: cargo run -p xtask -- all
      - name: Supply chain — licenses + advisories + sources (gating)
        run: cargo deny check
      - name: Advisories (RUSTSEC, gating)
        run: cargo audit
      - name: SBOM is non-empty and published (REQ-CON-020)
        run: |
          test -s docs/sbom.cyclonedx.json
          grep -q '"bomFormat":"CycloneDX"' docs/sbom.cyclonedx.json
      - name: Reproduce gate (deterministic vectors, REQ-GOV-050)
        run: cargo run --release --bin overlay-broadcast -- reproduce
      - name: Selftest gate (every layer, REQ-GOV-051)
        run: cargo run --release --bin overlay-broadcast -- selftest
      - name: Robustness fuzz (stable, short)
        run: cargo test -p fuzzprop
      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: docs/sbom.cyclonedx.json

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install coverage tooling
        run: |
          rustup component add llvm-tools-preview
          cargo install cargo-llvm-cov --locked
      # REQ-TST-010: line+branch coverage, gated at documented minimums. The crypto/
      # protocol crates (secmem, bsv, ckd, cipher, keygraph, overlay, broadcast, session,
      # custody) carry the higher MC/DC-level bar.
      - name: Coverage (protocol crates, >= 90%)
        run: |
          cargo llvm-cov --branch --fail-under-lines 90 \
            -p secmem -p bsv -p ckd -p cipher -p keygraph -p overlay -p broadcast -p session -p custody
      - name: Coverage (workspace, >= 80%)
        run: cargo llvm-cov --workspace --fail-under-lines 80

  mutation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install cargo-mutants
        run: cargo install cargo-mutants --locked
      # REQ-TST-011: mutation testing on the crypto/protocol crates; surviving mutants must
      # be killed by a new test or documented as equivalent.
      - name: Mutation triage (protocol crates)
        run: |
          for crate in secmem bsv ckd cipher keygraph overlay broadcast session custody; do
            cargo mutants -p "$crate" --in-place || exit 1
          done

  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install nightly + cargo-fuzz
        run: |
          rustup toolchain install nightly
          cargo install cargo-fuzz --locked || true
      - name: Fuzz short-run of every target (REQ-FUZ-001..005)
        working-directory: fuzz
        run: |
          for target in tx_parser script_parser header_parser api_request rekey_payload; do
            cargo +nightly fuzz run "$target" -- -runs=20000 -max_total_time=60 || exit 1
          done

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build hardened image
        run: docker build -t overlay-broadcast:ci .
      - name: Assert non-root + no shell + read-only start (REQ-CON-001/002)
        run: |
          docker run --rm --read-only --cap-drop ALL --security-opt no-new-privileges overlay-broadcast:ci selftest
          ! docker run --rm overlay-broadcast:ci /bin/sh -c 'echo shell' 2>/dev/null
      - name: Hardened test compose profile (REQ-CON-011)
        run: docker compose -f docker-compose.hardened.yml --profile test up --abort-on-container-exit
